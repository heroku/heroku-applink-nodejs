name: Release

on:
  push:
    branches:
      - main
      - next

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: pub-hk-ubuntu-24.04-ip
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          target-branch: ${{ github.ref_name }}
          config-file: ${{ github.ref_name == 'next' && 'release-please-config-next.json' || 'release-please-config.json' }}
          manifest-file: ${{ github.ref_name == 'next' && '.release-please-manifest-next.json' || '.release-please-manifest.json' }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: pub-hk-ubuntu-24.04-ip
    permissions:
      contents: read
      id-token: write
    env:
      NPM_DIST_TAG: ${{ needs.release-please.outputs.prerelease == 'true' && 'beta' || 'latest' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: yarn install
      - run: yarn build
      - name: Publish to npm
        run: npm publish --access public --tag "$NPM_DIST_TAG"
