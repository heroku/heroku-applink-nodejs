name: Build
on:
  push:
    # Avoid duplicate builds on PRs.
    branches:
      - main
  pull_request:
permissions:
  contents: read
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        version: [24.x, 22.x, 20.x, 18.x]
        os: [ubuntu-latest, macos-14-large, windows-latest]
    name: Node ${{ matrix.version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5 # java required for testing with wiremock
        with:
          java-package: jre
          java-version: "11"
          distribution: "zulu"
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.version }}
          cache: "yarn"
      - name: Install dependencies
        run: |
          if [[ "${{ matrix.version }}" == "18.x" ]]; then
            # Node 18 requires --ignore-engines for serialize-javascript@7.0.4
            # which fixes high-severity RCE but declares engines.node >=20
            yarn install --ignore-engines
          else
            yarn install
          fi
      - run: yarn format:check
      - run: yarn lint
      - run: yarn test:coverage
      - run: yarn build
