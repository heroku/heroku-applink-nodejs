name: Build
on:
  push:
    # Avoid duplicate builds on PRs.
    branches:
      - main
  pull_request:
permissions:
  contents: read
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        version: [22.x, 20.x, 18.x]
        os: [ubuntu-latest, macos-14-large, windows-latest]
    name: Node ${{ matrix.version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Debug workspace (Windows only)
        if: ${{ matrix.os }} == 'windows-latest' && ${{ matrix.version }} == '20.x'
        run: |
          Write-Host "PWD: $PWD"
          Write-Host "Runner workspace: $env:RUNNER_WORKSPACE"
          Write-Host "Listing D:\\"
          Get-ChildItem D:\
          Write-Host "Listing D:\\a"
          Get-ChildItem D:\a
      - uses: actions/setup-java@v4 # java required for testing with wiremock
        with:
          java-package: jre
          java-version: "11"
          distribution: "zulu"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.version }}
          cache: "yarn"
      - run: yarn install
      - run: yarn format:check
      - run: yarn lint
      - run: yarn test:coverage
      - run: yarn build
