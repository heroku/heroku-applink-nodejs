name: Build
on:
  push:
    # Avoid duplicate builds on PRs.
    branches:
      - main
  pull_request:
permissions:
  contents: read
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Node 26.x is pinned to 26.3.0; 26.3.1's CVE-2026-48931 http.Agent
        # patch hangs node-fetch@2.x keep-alive sockets. Unpin once
        # https://github.com/nodejs/node/issues/63989 is resolved.
        version: [26.3.0, 24.x, 22.x]
        os: [ubuntu-latest, macos-14-large, windows-latest]
    name: Node ${{ matrix.version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5 # java required for testing with wiremock
        with:
          java-package: jre
          java-version: "11"
          distribution: "zulu"
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.version }}
          cache: "yarn"
      - name: Install dependencies
        run: yarn install
      - run: yarn format:check
      - run: yarn lint
      - run: yarn test:coverage
      - run: yarn build
